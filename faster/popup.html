<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      width: 140px;
      background-color: #f9f9f9;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 16px;
    }
    label {
      display: block;
      margin: 8px 0;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h3>Global Speed</h3>
  <label><input type="radio" name="speed" value="1.0"> 1x (Normal)</label>
  <label><input type="radio" name="speed" value="2.0"> 2x</label>
  <label><input type="radio" name="speed" value="3.0"> 3x</label>
  <label><input type="radio" name="speed" value="4.0"> 4x</label>
  <label><input type="radio" name="speed" value="5.0"> 5x</label>

  <script src="popup.js"></script>
</body>
</html>
